<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>練習小屋 — 寫程式不用緊張</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21h6M10 21v-2.5M14 21v-2.5M7 13.5a5 5 0 1 1 10 0c0 1.7-.9 3.2-2.3 4-.5.3-.7.8-.7 1.3v.7H10v-.7c0-.5-.2-1-.7-1.3A4.7 4.7 0 0 1 7 13.5z"/>
        </svg>
      </span>
      <div class="brand-text">
        <div class="brand-title">練習小屋</div>
        <div class="brand-sub">慢慢來，一題一題練</div>
      </div>
    </div>
    <div class="topbar-right">
      <label class="select-label">
        <span>題目</span>
        <select id="problem-select">
          <option value="aplusb">A + B Problem</option>
          <option value="factorial">階乘計算</option>
          <option value="prime">質數判定</option>
        </select>
      </label>
      <span class="lang-badge">C++</span>
      <button id="btn-settings" class="icon-btn" title="偏好設定">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="layout">
    <section class="panel problem-panel">
      <div class="panel-header">
        <span>題目</span>
      </div>
      <div class="panel-body" id="problem-body"></div>
    </section>

    <section class="panel code-panel">
      <div class="panel-header">
        <span>程式碼</span>
        <div class="actions">
          <button id="btn-reset" class="btn-ghost" title="還原成初始程式碼">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 3-6.7"/>
              <path d="M3 4v5h5"/>
            </svg>
            還原
          </button>
          <button id="btn-run" class="btn">試跑一下</button>
          <button id="btn-submit" class="btn btn-primary">送出評測</button>
        </div>
      </div>
      <div id="editor" class="editor"></div>

      <div class="bottom-tabs">
        <button class="tab-btn active" data-tab="output">輸出 / 診錯</button>
        <button class="tab-btn" data-tab="custom">自訂輸入</button>
        <span id="output-summary" class="summary"></span>
      </div>

      <div class="tab-content" id="tab-output">
        <div class="output-body" id="output-body">
          <div class="output-empty">寫好程式後，按「試跑一下」或「送出評測」開始</div>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-custom">
        <div class="custom-input-area">
          <label class="custom-label">餵一筆你想測的輸入給程式跑跑看</label>
          <textarea id="custom-input" placeholder="例如：&#10;3 5"></textarea>
          <div class="custom-actions">
            <button id="btn-run-custom" class="btn btn-primary">用這個輸入跑</button>
          </div>
          <div id="custom-output" class="custom-output"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <span>偏好設定</span>
      <button id="btn-close-settings" class="icon-btn" title="關閉">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="setting-row">
        <label>字體大小</label>
        <div class="setting-control">
          <input type="range" id="font-size" min="12" max="22" step="1" value="14">
          <span id="font-size-val" class="setting-value">14</span>
        </div>
      </div>
      <div class="setting-row">
        <label>Tab 寬度</label>
        <div class="setting-control">
          <select id="tab-size">
            <option value="2">2 個空白</option>
            <option value="4" selected>4 個空白</option>
            <option value="8">8 個空白</option>
          </select>
        </div>
      </div>
      <div class="setting-row">
        <label>自動換行</label>
        <div class="setting-control">
          <input type="checkbox" id="word-wrap">
        </div>
      </div>
      <div class="setting-row">
        <label>顯示小地圖</label>
        <div class="setting-control">
          <input type="checkbox" id="minimap">
        </div>
      </div>
    </div>
    <div class="settings-footer">
      設定會自動保存
    </div>
  </div>
  <div id="settings-backdrop" class="settings-backdrop hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="app.js"></script>
</body>
</html>
